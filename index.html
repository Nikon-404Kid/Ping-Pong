<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; background: #222; color: white; font-family: sans-serif; }
        canvas { background: #000; display: block; margin: 20px auto; border: 2px solid #fff; }
        .menu { margin-top: 50px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Пинг-Понг</h2>
    <div id="menu" class="menu">
        <button onclick="startGame('pvp')">Игрок vs Игрок</button>
        <button onclick="startGame('pve')">Игрок vs Бот</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400" style="display:none;"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("menu");

        let gameMode = null; // 'pvp' или 'pve'
        let ball = { x: 400, y: 200, dx: 5, dy: 5, radius: 10 };
        let p1 = { y: 150, width: 10, height: 80 };
        let p2 = { y: 150, width: 10, height: 80, speed: 6 };

        function startGame(mode) {
            gameMode = mode;
            menu.style.display = "none";
            canvas.style.display = "block";
            loop();
        }

        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            p1.y = e.clientY - rect.top - p1.height / 2;
        });

        window.addEventListener("keydown", (e) => {
            if (gameMode === 'pvp') {
                if (e.key === "w") p2.y -= 20;
                if (e.key === "s") p2.y += 20;
            }
        });

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Логика Бота (PVE)
            if (gameMode === 'pve') {
                let botCenter = p2.y + p2.height / 2;
                if (botCenter < ball.y - 10) p2.y += p2.speed;
                if (botCenter > ball.y + 10) p2.y -= p2.speed;
            }

            if (ball.y < 0 || ball.y > canvas.height) ball.dy *= -1;

            if (ball.x < 20 && ball.y > p1.y && ball.y < p1.y + p1.height) ball.dx *= -1;
            if (ball.x > 770 && ball.y > p2.y && ball.y < p2.y + p2.height) ball.dx *= -1;

            if (ball.x < 0 || ball.x > canvas.width) {
                ball.x = 400; ball.y = 200;
                ball.dx *= -1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(10, p1.y, p1.width, p1.height);
            ctx.fillRect(780, p2.y, p2.width, p2.height);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
